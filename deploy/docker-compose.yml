services:
  front-screen:
    image: ghcr.io/flipgame-hetic/front-screen:main
    pull_policy: always
    ports: ["0:80"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 5s
      timeout: 2s
      retries: 5

  back-screen:
    image: ghcr.io/flipgame-hetic/back-screen:main
    pull_policy: always
    ports: ["0:80"]

  dmd-screen:
    image: ghcr.io/flipgame-hetic/dmd-screen:main
    pull_policy: always
    ports: ["0:80"]

  api:
    image: ghcr.io/flipgame-hetic/backend:main
    pull_policy: always
    environment:
      API_PORT: "8080"
      APP_ENV: production
      DATABASE_URL: "sqlite:////data/flipper.db"
    volumes:
      - backend-data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.d:/etc/nginx/default.d:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  backend-data:
  mosquitto-data:
